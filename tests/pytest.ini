[pytest]
minversion = 3.0
norecursedirs = .*
python_files = test_*
python_classes = Test*
python_functions = test_*
xfail_strict = true
# -n is fixed (not "auto") on purpose: the frontier code runs joblib
# Parallel(n_jobs=-1) internally, so "-n auto" (one xdist worker per CPU) stacks
# process-parallelism on top of process-parallelism (xdist x loky x BLAS), which
# has exhausted RAM and frozen the machine. Keep the outer level bounded.
addopts = -n 4 -q --durations=10
filterwarnings =
    ignore::FutureWarning


markers =
    smoke: All critical smoke tests
    asset: Asset class tests
    asset_list: AssetList class test
    portfolio: Portfolio class tests
    inflation: Inflation class tests
    indicator: Indicator class tests
    frontier: EfficientFrontier and EfficientFrontierReb classes tests
    rebalance: Rebalancing strategy tests
    rates: Rates class tests
    test: For test new code